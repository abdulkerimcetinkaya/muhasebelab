      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
    .row-error { animation: shake 0.3s ease-in-out; }
    @keyframes slide-up {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }

    .toast-enter { animation: slide-up 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

    @keyframes float-y {
      0%, 100% { transform: translateY(0) rotate(-3deg); }

    }
    @keyframes float-y-2 {
      0%, 100% { transform: translateY(0) rotate(4deg); }
      50% { transform: translateY(-16px) rotate(-4deg); }

    .thiings-float-4 { animation: float-y-2 5.5s ease-in-out infinite; animation-delay: 0.5s; }

        if (ref.current) {
          ref.current.innerHTML = '';
          const iconFn = lucide[name];
          if (iconFn) {
            const svg = lucide.createElement(iconFn);
            svg.setAttribute('width', size);
            svg.setAttribute('height', size);
            ref.current.appendChild(svg);
          }
        }
      }, [name, size]);
      return <span ref={ref} className={"inline-flex " + className} {...props} />;
    };

        return (
          <div
            className={`${className} ${animClass} inline-flex items-center justify-center rounded-2xl`}
            style={{
              width: size, height: size,
              background: "linear-gradient(135deg, #dbeafe, #bfdbfe)",
              boxShadow: "0 10px 20px rgba(0,0,0,0.08)",
            }}>
            <span className="text-[9px] font-semibold text-blue-800 px-1 text-center leading-tight" style={{ fontFamily: "var(--font-display)" }}>
              {name}
            </span>
          </div>
        );
      }
      return (
        <img
          src={`icons/${name}.png`}
          alt={name}
          onError={() => setYok(true)}
          className={`thiings-img ${animClass} ${className}`}

      userRows.forEach((u, i) => {
        const idx = cozumRows.findIndex((c, ci) => {
          if (kullanilan.has(ci)) return false;
          return c.kod === u.kod &&
            Math.abs((+u.borc || 0) - (c.borc || 0)) < 0.01 &&
            Math.abs((+u.alacak || 0) - (c.alacak || 0)) < 0.01;
        });
        if (idx !== -1) { sonuclar[i] = true; kullanilan.add(idx); }
      });
      const hepsiDogru = sonuclar.every(s => s) && userRows.length === cozumRows.length;
      return { satirSonuclari: sonuclar, hepsiDogru };

    function HesapKoduInput({ value, onChange, rowIndex }) {
      const [dropdownAcik, setDropdownAcik] = useState(false);
      const [seciliIdx, setSeciliIdx] = useState(0);
      const containerRef = useRef(null);

      const oneriler = useMemo(() => {
        if (!value || value.length === 0) return [];
        const q = value.toLocaleLowerCase("tr");
        return HESAP_PLANI.filter(h =>
          h.kod.startsWith(value) || h.ad.toLocaleLowerCase("tr").includes(q)
        ).slice(0, 7);
      }, [value]);

      useEffect(() => { setSeciliIdx(0); }, [value]);
      useEffect(() => {
        const handler = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) setDropdownAcik(false);
        };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, []);

      const secim = (hesap) => {
        onChange(hesap.kod);
        setDropdownAcik(false);
        setTimeout(() => {
          const borcInput = document.querySelector(`[data-row="${rowIndex}"][data-col="borc"]`);
          if (borcInput) borcInput.focus();
        }, 0);
      };

      const handleKey = (e) => {
        if (!dropdownAcik || oneriler.length === 0) return;
        if (e.key === "ArrowDown") { e.preventDefault(); setSeciliIdx((seciliIdx + 1) % oneriler.length); }
        else if (e.key === "ArrowUp") { e.preventDefault(); setSeciliIdx((seciliIdx - 1 + oneriler.length) % oneriler.length); }
        else if (e.key === "Enter" || e.key === "Tab") {
          if (oneriler[seciliIdx]) { e.preventDefault(); secim(oneriler[seciliIdx]); }
        } else if (e.key === "Escape") setDropdownAcik(false);
      };

      return (
        <div className="relative" ref={containerRef}>
          <input type="text" value={value}
            onChange={(e) => { onChange(e.target.value.trim()); setDropdownAcik(true); }}
            onFocus={() => setDropdownAcik(true)} onKeyDown={handleKey}
            placeholder="Kod / ad..."
            data-row={rowIndex} data-col="kod"
            className="w-full font-mono text-sm px-2 py-1.5 bg-stone-50 dark:bg-zinc-800 border border-transparent focus:border-stone-900 dark:focus:border-zinc-400 focus:bg-white dark:focus:bg-zinc-900 outline-none transition" />
          {dropdownAcik && oneriler.length > 0 && (
            <div className="autocomplete-dropdown absolute top-full left-0 mt-1 bg-white dark:bg-zinc-900 border border-stone-900/10 dark:border-zinc-700 z-50 max-h-64 overflow-auto rounded-xl" style={{ minWidth: "340px" }}>

                <button key={h.kod}
                  onMouseDown={(e) => { e.preventDefault(); secim(h); }}
                  onMouseEnter={() => setSeciliIdx(i)}
                  className={`w-full flex items-center gap-3 px-3 py-2 text-left text-xs hover:bg-stone-50 dark:hover:bg-zinc-800 ${i === seciliIdx ? "bg-stone-100 dark:bg-zinc-800" : ""}`}>
                  <span className="font-mono font-semibold w-10">{h.kod}</span>
                  <span className="flex-1">{h.ad}</span>
                  <span className={`text-[9px] tracking-widest uppercase font-semibold ${
                    h.tur === "AKTİF" ? "text-blue-700 dark:text-blue-400" :
                    h.tur === "PASİF" ? "text-amber-700 dark:text-amber-400" :
                    h.tur === "GELİR" ? "text-emerald-700 dark:text-emerald-400" :
                    h.tur === "GİDER" ? "text-red-700 dark:text-red-400" : "text-stone-500"
                  }`}>{h.tur}</span>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [ilerleme, setIlerleme] = useState(ilerlemeYukle);
      const [route, setRoute] = useState(parseHash);
      const [planAcik, setPlanAcik] = useState(false);
      const [yanPanelAcik, setYanPanelAcik] = useState(false);
      const [rozetKuyrugu, setRozetKuyrugu] = useState([]);

      useEffect(() => {
        ilerlemeKaydet(ilerleme);
        document.body.classList.toggle("dark", ilerleme.tema === "dark");
      }, [ilerleme]);

      useEffect(() => {
        const handler = () => setRoute(parseHash());
        window.addEventListener("hashchange", handler);
        return () => window.removeEventListener("hashchange", handler);
      }, []);

      useEffect(() => {
        const stat = istatistikHesapla(ilerleme);
        const yeniRozetler = [];
        ROZETLER.forEach(r => {
          if (!ilerleme.kazanilanRozetler[r.id] && r.kontrol(stat)) yeniRozetler.push(r);
        });
        if (yeniRozetler.length > 0) {
          setIlerleme(prev => {
            const yeniKazanilan = { ...prev.kazanilanRozetler };
            yeniRozetler.forEach(r => { yeniKazanilan[r.id] = bugununTarihi(); });
            return { ...prev, kazanilanRozetler: yeniKazanilan };
          });
          setRozetKuyrugu(prev => [...prev, ...yeniRozetler]);
        }
      }, [ilerleme.cozulenler, ilerleme.puan, ilerleme.streak]);

      const soruCozuldu = (soru) => {
        if (ilerleme.cozulenler[soru.id]) return;
        const bugun = bugununTarihi();
        const dun = new Date(Date.now() - 86400000).toISOString().split("T")[0];
        let yeniStreak = ilerleme.streak;
        if (ilerleme.sonCozumTarihi === bugun) yeniStreak = ilerleme.streak;
        else if (ilerleme.sonCozumTarihi === dun) yeniStreak = ilerleme.streak + 1;
        else yeniStreak = 1;
        const puan = ZORLUK_PUAN[soru.zorluk] || 10;
        const yeniAkt = { ...ilerleme.aktiviteTarihleri };
        yeniAkt[bugun] = (yeniAkt[bugun] || 0) + 1;
        setIlerleme({
          ...ilerleme,
          cozulenler: { ...ilerleme.cozulenler, [soru.id]: { tarih: bugun, zorluk: soru.zorluk } },
          puan: ilerleme.puan + puan, streak: yeniStreak,
          sonCozumTarihi: bugun, aktiviteTarihleri: yeniAkt,
        });
      };

      const yanlisKaydet = (soruId) => {
        setIlerleme(prev => ({
          ...prev,
          yanlislar: { ...prev.yanlislar, [soruId]: (prev.yanlislar[soruId] || 0) + 1 },
        }));
      };

      const ilerlemeSifirla = () => {
        if (!confirm("Tüm ilerleme silinecek. Emin misiniz?")) return;
        setIlerleme({ ...varsayilanIlerleme(), tema: ilerleme.tema, kullaniciAdi: ilerleme.kullaniciAdi });
      };

      const temaDegistir = () => setIlerleme(prev => ({ ...prev, tema: prev.tema === "dark" ? "light" : "dark" }));
      const kullaniciAdiGuncelle = (ad) => setIlerleme(prev => ({ ...prev, kullaniciAdi: ad }));

      const veriDisaAktar = () => {
        const data = JSON.stringify(ilerleme, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `muhasebelab-${bugununTarihi()}.json`;
        a.click();
        URL.revokeObjectURL(url);
      };

      const stat = istatistikHesapla(ilerleme);
      const aktifSoru = route.sayfa === "soru" ? TUM_SORULAR.find(s => s.id === route.soruId) : null;

      return (
        <div className="min-h-screen bg-stone-50 dark:bg-zinc-900 text-stone-900 dark:text-zinc-100 transition-colors">
          <Navbar route={route} ilerleme={ilerleme}
            onTemaDegistir={temaDegistir}
            onHesapPlaniAc={() => setPlanAcik(true)} />

          {route.sayfa === "ana" && <AnaSayfa ilerleme={ilerleme} stat={stat} />}
          {route.sayfa === "problemler" && <ProblemlerSayfasi ilerleme={ilerleme} />}
          {route.sayfa === "profil" && (
            <ProfilSayfasi ilerleme={ilerleme} stat={stat}
              onKullaniciAdiGuncelle={kullaniciAdiGuncelle}
              onSifirla={ilerlemeSifirla}
              onDisaAktar={veriDisaAktar}
              onTemaDegistir={temaDegistir} />
          )}
          {route.sayfa === "soru" && aktifSoru && (
            <SoruEkrani soru={aktifSoru}
              onCozuldu={() => soruCozuldu(aktifSoru)}
              onYanlis={() => yanlisKaydet(aktifSoru.id)}
              cozulmusMu={!!ilerleme.cozulenler[aktifSoru.id]}
              onHesapPlaniYanPanel={() => setYanPanelAcik(true)} />
          )}

          {planAcik && <HesapPlaniModal onKapat={() => setPlanAcik(false)} />}
          <HesapPlaniYanPanel acik={yanPanelAcik} onKapat={() => setYanPanelAcik(false)} />

          {rozetKuyrugu[0] && (
            <RozetToast rozet={rozetKuyrugu[0]} onKapat={() => setRozetKuyrugu(prev => prev.slice(1))} />
          )}
        </div>
      );
    }

                  </div>
                </div>
              ))}
            </div>
            <div className="mt-3 border-l-2 border-red-600 pl-3 py-1 bg-red-50/50 dark:bg-red-900/10 rounded">
              <div className="text-[10px] text-red-700 dark:text-red-400 font-bold">Hata: 320 yerine 100 Kasa olmalıydı (peşin ödeme).</div>
            </div>
          </div>
        );
      }
      if (tip === "istatistik") {
        return (
          <div className="p-6 text-xs">
            <div className="grid grid-cols-3 gap-2 mb-4">
              {[
                { et: "Çözülen", de: "18" },
                { et: "Puan", de: "245" },
                { et: "Seri", de: "7", icon: "Flame" },
              ].map((s, i) => (
                <div key={i} className="border border-stone-200 dark:border-zinc-700 p-3 rounded-lg">
                  <div className="text-[8px] tracking-widest uppercase text-stone-500 mb-1 font-bold">{s.et}</div>
                  <div className="font-display text-2xl font-bold flex items-center gap-1">
                    {s.de}
                    {s.icon && <Icon name={s.icon} size={14} className="text-orange-600" />}
                  </div>
                </div>
              ))}
            </div>
            <div className="text-[9px] tracking-widest uppercase text-stone-500 mb-2 font-bold">Ünite İlerlemesi</div>
            <div className="space-y-2">
              {[
                { ad: "Kasa", p: 100 }, { ad: "Banka", p: 67 },
                { ad: "Ticari Mal", p: 33 }, { ad: "KDV", p: 50 },
              ].map((u, i) => (
                <div key={i}>
                  <div className="flex justify-between text-[10px] mb-1 font-medium">
                    <span>{u.ad}</span>
                    <span className="font-mono font-bold">%{u.p}</span>
                  </div>
                  <div className="h-1 bg-stone-100 dark:bg-zinc-800 rounded-full overflow-hidden"><div className="h-full bg-blue-700 dark:bg-blue-400" style={{ width: `${u.p}%` }}></div></div>
                </div>
              ))}
            </div>
          </div>
        );
      }
      if (tip === "zorluk") {
        return (
          <div className="p-6 text-xs space-y-2">
            {[
              { zor: "Kolay", renk: "text-emerald-700 dark:text-emerald-400", baslik: "Sermaye Koyma", p: 5 },
              { zor: "Kolay", renk: "text-emerald-700 dark:text-emerald-400", baslik: "Kasadan Bankaya", p: 5 },
              { zor: "Orta", renk: "text-amber-700 dark:text-amber-400", baslik: "Peşin Mal Satışı", p: 10 },
              { zor: "Orta", renk: "text-amber-700 dark:text-amber-400", baslik: "KDV Mahsubu", p: 10 },
              { zor: "Zor", renk: "text-rose-700 dark:text-rose-400", baslik: "Veresiye Mal Satışı", p: 20 },
              { zor: "Zor", renk: "text-rose-700 dark:text-rose-400", baslik: "Ücret Tahakkuku", p: 20 },
            ].map((s, i) => (
              <div key={i} className="flex items-center justify-between py-2 border-b border-stone-100 dark:border-zinc-800">
                <div className="flex items-center gap-3">
                  <Icon name="CheckCircle2" size={12} className={i < 3 ? "text-emerald-600" : "text-stone-300 dark:text-zinc-700"} />
                  <span className="font-semibold">{s.baslik}</span>
                </div>
                <div className="flex items-center gap-3">
                  <span className={`text-[9px] tracking-widest uppercase font-bold ${s.renk}`}>{s.zor}</span>
                  <span className="font-mono text-stone-500 font-bold">{s.p}p</span>
                </div>
              </div>
            ))}
          </div>
        );
      }
      return null;
    }

    function ProblemlerSayfasi({ ilerleme }) {
      const [arama, setArama] = useState("");
      const [zorlukFiltre, setZorlukFiltre] = useState("hepsi");
      const [uniteFiltre, setUniteFiltre] = useState("hepsi");
      const [durumFiltre, setDurumFiltre] = useState("hepsi");
      const [siralamaFld, setSiralamaFld] = useState("sira");
      const [siralamaYon, setSiralamaYon] = useState("asc");

      const filtreli = useMemo(() => {
        let sonuc = [...TUM_SORULAR];
        if (zorlukFiltre !== "hepsi") sonuc = sonuc.filter(s => s.zorluk === zorlukFiltre);
        if (uniteFiltre !== "hepsi") sonuc = sonuc.filter(s => s.uniteId === uniteFiltre);
        if (durumFiltre === "cozulen") sonuc = sonuc.filter(s => ilerleme.cozulenler[s.id]);
        if (durumFiltre === "cozulmeyen") sonuc = sonuc.filter(s => !ilerleme.cozulenler[s.id]);
        if (arama.trim()) {
          const q = arama.toLocaleLowerCase("tr");
          sonuc = sonuc.filter(s =>
            s.baslik.toLocaleLowerCase("tr").includes(q) ||
            s.senaryo.toLocaleLowerCase("tr").includes(q) ||
            s.uniteAd.toLocaleLowerCase("tr").includes(q)
          );
        }
        sonuc.sort((a, b) => {
          let x = 0;
          if (siralamaFld === "zorluk") x = ZORLUK_SIRA[a.zorluk] - ZORLUK_SIRA[b.zorluk];
          else if (siralamaFld === "unite") x = a.uniteAd.localeCompare(b.uniteAd, "tr");
          else if (siralamaFld === "durum") x = (ilerleme.cozulenler[a.id] ? 1 : 0) - (ilerleme.cozulenler[b.id] ? 1 : 0);
          else x = 0;
          return siralamaYon === "asc" ? x : -x;
        });
        return sonuc;
      }, [arama, zorlukFiltre, uniteFiltre, durumFiltre, siralamaFld, siralamaYon, ilerleme.cozulenler]);

      const sirala = (fld) => {
        if (siralamaFld === fld) setSiralamaYon(siralamaYon === "asc" ? "desc" : "asc");
        else { setSiralamaFld(fld); setSiralamaYon("asc"); }
      };

      const SirOk = ({ fld }) => {
        if (siralamaFld !== fld) return <Icon name="ChevronsUpDown" size={10} className="text-stone-300 dark:text-zinc-700" />;
        return <Icon name={siralamaYon === "asc" ? "ChevronUp" : "ChevronDown"} size={10} />;
      };

      const cozulenSayi = TUM_SORULAR.filter(s => ilerleme.cozulenler[s.id]).length;

      return (
        <main className="max-w-7xl mx-auto px-6 py-12">
          <div className="mb-8">
            <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-3 font-bold">Tüm Sorular</div>
            <h1 className="font-display text-5xl md:text-6xl tracking-tight mb-3 font-bold">Problemler</h1>
            <p className="text-stone-600 dark:text-zinc-400 max-w-2xl font-medium">
              {TUM_SORULAR.length} soru · {cozulenSayi} çözüldü · %{Math.round((cozulenSayi / TUM_SORULAR.length) * 100)} ilerleme
            </p>
          </div>

          <div className="mb-6 bg-white dark:bg-zinc-800/50 border border-stone-200 dark:border-zinc-700 p-4 rounded-xl">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
              <div className="relative md:col-span-1">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">
                  <Icon name="Search" size={14} />
                </span>
                <input type="text" value={arama} onChange={(e) => setArama(e.target.value)}
                  placeholder="Ara..."
                  className="w-full pl-9 pr-3 py-2 bg-stone-50 dark:bg-zinc-900 border border-stone-300 dark:border-zinc-700 focus:border-stone-900 dark:focus:border-zinc-400 outline-none text-sm rounded-lg font-medium" />
              </div>
              <select value={zorlukFiltre} onChange={(e) => setZorlukFiltre(e.target.value)}
                className="px-3 py-2 bg-stone-50 dark:bg-zinc-900 border border-stone-300 dark:border-zinc-700 text-sm focus:border-stone-900 dark:focus:border-zinc-400 outline-none rounded-lg font-medium">
                <option value="hepsi">Tüm Zorluklar</option>
                <option value="kolay">Kolay</option>
                <option value="orta">Orta</option>
                <option value="zor">Zor</option>
              </select>
              <select value={uniteFiltre} onChange={(e) => setUniteFiltre(e.target.value)}
                className="px-3 py-2 bg-stone-50 dark:bg-zinc-900 border border-stone-300 dark:border-zinc-700 text-sm focus:border-stone-900 dark:focus:border-zinc-400 outline-none rounded-lg font-medium">
                <option value="hepsi">Tüm Üniteler</option>
                {UNITELER.map(u => <option key={u.id} value={u.id}>{u.ad}</option>)}
              </select>
              <select value={durumFiltre} onChange={(e) => setDurumFiltre(e.target.value)}
                className="px-3 py-2 bg-stone-50 dark:bg-zinc-900 border border-stone-300 dark:border-zinc-700 text-sm focus:border-stone-900 dark:focus:border-zinc-400 outline-none rounded-lg font-medium">
                <option value="hepsi">Tüm Durumlar</option>
                <option value="cozulen">Çözülenler</option>
                <option value="cozulmeyen">Henüz Çözülmemiş</option>
              </select>
            </div>
          </div>

          <div className="bg-white dark:bg-zinc-900 border border-stone-200 dark:border-zinc-700 rounded-xl overflow-hidden">
            <div className="grid grid-cols-12 gap-3 px-4 py-3 border-b border-stone-200 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-800 text-[10px] tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">
              <button onClick={() => sirala("durum")} className="col-span-1 text-left flex items-center gap-1 hover:text-stone-900 dark:hover:text-zinc-100">
                Durum <SirOk fld="durum" />
              </button>
              <div className="col-span-5">Başlık</div>
              <button onClick={() => sirala("unite")} className="col-span-3 text-left flex items-center gap-1 hover:text-stone-900 dark:hover:text-zinc-100">
                Ünite <SirOk fld="unite" />
              </button>
              <button onClick={() => sirala("zorluk")} className="col-span-2 text-left flex items-center gap-1 hover:text-stone-900 dark:hover:text-zinc-100">
                Zorluk <SirOk fld="zorluk" />
              </button>
              <div className="col-span-1 text-right">Puan</div>
            </div>
            {filtreli.map((s) => {
              const cozulmus = !!ilerleme.cozulenler[s.id];
              const yanlisSayi = ilerleme.yanlislar[s.id] || 0;
              return (
                <button key={s.id}
                  onClick={() => navigate(`/problemler/${s.id}`)}
                  className="w-full grid grid-cols-12 gap-3 px-4 py-3 border-b border-stone-100 dark:border-zinc-800 hover:bg-stone-50 dark:hover:bg-zinc-800/50 transition text-left items-center">
                  <div className="col-span-1">
                    {cozulmus
                      ? <Icon name="CheckCircle2" size={18} className="text-emerald-700 dark:text-emerald-400" />
                      : yanlisSayi > 0
                      ? <Icon name="XCircle" size={18} className="text-rose-500" />
                      : <Icon name="Circle" size={18} className="text-stone-300 dark:text-zinc-700" />}
                  </div>
                  <div className="col-span-5">
                    <div className="font-display text-base leading-tight font-bold">{s.baslik}</div>
                    <div className="text-xs text-stone-500 dark:text-zinc-500 line-clamp-1 mt-0.5 font-medium">{s.senaryo}</div>
                  </div>
                  <div className="col-span-3 flex items-center gap-2 text-sm">
                    <Thiings name={s.uniteIcon} size={24} />
                    <span className="text-stone-700 dark:text-zinc-300 truncate font-semibold">{s.uniteAd}</span>
                  </div>
                  <div className="col-span-2">
                    <span className={`text-[10px] tracking-[0.2em] uppercase font-bold ${ZORLUK_STIL[s.zorluk]}`}>{ZORLUK_AD[s.zorluk]}</span>
                  </div>
                  <div className="col-span-1 text-right font-mono text-sm text-stone-500 dark:text-zinc-500 font-bold">
                    {ZORLUK_PUAN[s.zorluk]}
                  </div>
                </button>
              );
            })}
            {filtreli.length === 0 && (
              <div className="py-16 text-center text-stone-400 dark:text-zinc-600 font-medium">
                Filtrelere uyan soru bulunamadı.
              </div>
            )}
          </div>

          <div className="mt-4 text-xs text-stone-500 dark:text-zinc-500 font-semibold">
            {filtreli.length} / {TUM_SORULAR.length} soru gösteriliyor
          </div>
        </main>
      );
    }

    function ProfilSayfasi({ ilerleme, stat, onKullaniciAdiGuncelle, onSifirla, onDisaAktar, onTemaDegistir }) {
      const [adDuzenle, setAdDuzenle] = useState(false);
      const [geciciAd, setGeciciAd] = useState(ilerleme.kullaniciAdi);

      const avatarHarfi = (ilerleme.kullaniciAdi || "?")[0].toUpperCase();
      const avatarRenk = useMemo(() => {
        const renkler = ["bg-blue-700", "bg-emerald-700", "bg-rose-700", "bg-amber-700", "bg-violet-700", "bg-teal-700"];
        let hash = 0;
        for (let i = 0; i < (ilerleme.kullaniciAdi || "X").length; i++) hash += ilerleme.kullaniciAdi.charCodeAt(i);
        return renkler[hash % renkler.length];
      }, [ilerleme.kullaniciAdi]);

      const son30Gun = useMemo(() => {
        const bugun = new Date();
        const gunler = [];
        for (let i = 29; i >= 0; i--) {
          const d = new Date(bugun.getTime() - i * 86400000);
          const k = d.toISOString().split("T")[0];
          gunler.push({ tarih: k, sayi: ilerleme.aktiviteTarihleri[k] || 0 });
        }
        return gunler;
      }, [ilerleme.aktiviteTarihleri]);
      const maxAkt = Math.max(1, ...son30Gun.map(g => g.sayi));
      const kazanilanRozetSayi = Object.keys(ilerleme.kazanilanRozetler).length;

      return (
        <main className="max-w-5xl mx-auto px-6 py-12">
          <section className="mb-12">
            <div className="flex flex-col sm:flex-row items-center sm:items-start gap-6 pb-8 border-b border-stone-900/10 dark:border-zinc-800">
              <div className={`w-28 h-28 ${avatarRenk} text-white font-display text-6xl font-bold flex items-center justify-center shadow-xl flex-shrink-0 rounded-2xl`}>
                {avatarHarfi}
              </div>
              <div className="flex-1 text-center sm:text-left">
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-2 font-bold">Kullanıcı</div>
                {adDuzenle ? (
                  <div className="flex gap-2 items-center justify-center sm:justify-start">
                    <input type="text" value={geciciAd} onChange={(e) => setGeciciAd(e.target.value)}
                      maxLength={30}
                      className="font-display text-4xl font-bold bg-transparent border-b-2 border-stone-900 dark:border-zinc-100 outline-none px-1" autoFocus />
                    <button onClick={() => { onKullaniciAdiGuncelle(geciciAd || "Öğrenci"); setAdDuzenle(false); }}
                      className="p-2 bg-stone-900 dark:bg-zinc-100 text-stone-50 dark:text-zinc-900 rounded-lg"><Icon name="Check" size={14} /></button>
                    <button onClick={() => { setGeciciAd(ilerleme.kullaniciAdi); setAdDuzenle(false); }}
                      className="p-2 border border-stone-300 dark:border-zinc-700 rounded-lg"><Icon name="X" size={14} /></button>
                  </div>
                ) : (
                  <div className="flex items-center gap-3 justify-center sm:justify-start">
                    <h1 className="font-display text-4xl md:text-5xl tracking-tight font-bold">{ilerleme.kullaniciAdi}</h1>
                    <button onClick={() => setAdDuzenle(true)}
                      className="text-stone-400 hover:text-stone-900 dark:hover:text-zinc-100 transition"
                      title="Adı düzenle">
                      <Icon name="Pencil" size={14} />
                    </button>
                  </div>
                )}
                <div className="mt-2 text-sm text-stone-500 dark:text-zinc-500 font-medium">
                  MuhasebeLab · {stat.cozulenSayi} soru çözüldü
                </div>
              </div>
            </div>
          </section>

          <section className="mb-12">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-px bg-stone-900/10 dark:bg-zinc-700 rounded-xl overflow-hidden">
              {[
                { et: "Çözülen", de: stat.cozulenSayi, toplam: stat.toplamSoru },
                { et: "Puan", de: ilerleme.puan, icon: "Trophy", renk: "text-amber-600" },
                { et: "Seri", de: ilerleme.streak, icon: "Flame", renk: "text-orange-600" },
                { et: "Rozet", de: kazanilanRozetSayi, toplam: ROZETLER.length },
              ].map((k, i) => (
                <div key={i} className="bg-stone-50 dark:bg-zinc-900 p-5">
                  <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-2 font-bold">{k.et}</div>
                  <div className="font-display text-4xl font-bold flex items-center gap-2">
                    {k.de}
                    {k.toplam && <span className="text-stone-400 dark:text-zinc-600 text-2xl">/{k.toplam}</span>}
                    {k.icon && <Icon name={k.icon} size={22} className={k.renk} />}
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="mb-12">
            <div className="flex items-baseline justify-between mb-6 border-b border-stone-900/20 dark:border-zinc-700 pb-3">
              <h2 className="font-display text-2xl md:text-3xl tracking-tight font-bold">Rozetler</h2>
              <span className="text-xs tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">
                {kazanilanRozetSayi}/{ROZETLER.length}
              </span>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
              {ROZETLER.map(r => {
                const kazanildi = !!ilerleme.kazanilanRozetler[r.id];
                return (
                  <div key={r.id}
                    className={`p-4 border text-center transition rounded-xl ${
                      kazanildi
                        ? "border-amber-600/40 bg-amber-50/40 dark:bg-amber-900/10 dark:border-amber-400/40"
                        : "border-stone-200 dark:border-zinc-800 opacity-40"
                    }`}>
                    <Icon name={r.icon} size={22} className={`mx-auto mb-2 ${kazanildi ? "text-amber-700 dark:text-amber-400" : "text-stone-400 dark:text-zinc-600"}`} />
                    <div className="font-display text-sm leading-tight mb-1 font-bold">{r.ad}</div>
                    <div className="text-[10px] text-stone-500 dark:text-zinc-500 leading-tight font-medium">{r.aciklama}</div>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="mb-12">
            <h2 className="font-display text-2xl md:text-3xl tracking-tight mb-6 pb-3 border-b border-stone-900/20 dark:border-zinc-700 font-bold">Ünite İlerlemesi</h2>
            <div className="space-y-4">
              {UNITELER.map(u => {
                const cozulen = u.sorular.filter(s => ilerleme.cozulenler[s.id]).length;
                const toplam = u.sorular.length;
                const yuzde = (cozulen / toplam) * 100;
                return (
                  <div key={u.id}>
                    <div className="flex justify-between items-center mb-1.5">
                      <span className="flex items-center gap-3 text-sm">
                        <Thiings name={u.thiingsIcon} size={28} />
                        <span className="font-semibold">{u.ad}</span>
                      </span>
                      <span className="font-mono text-xs text-stone-500 dark:text-zinc-500 font-bold">{cozulen}/{toplam}</span>
                    </div>
                    <div className="h-1.5 bg-stone-200 dark:bg-zinc-800 relative overflow-hidden rounded-full">
                      <div className="absolute inset-y-0 left-0 bg-stone-900 dark:bg-zinc-100 transition-all duration-700"
                        style={{ width: `${yuzde}%` }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          <section className="mb-12">
            <h2 className="font-display text-2xl md:text-3xl tracking-tight mb-6 pb-3 border-b border-stone-900/20 dark:border-zinc-700 font-bold">Son 30 Gün</h2>
            <div className="grid grid-cols-[repeat(30,minmax(0,1fr))] gap-1">
              {son30Gun.map((g, i) => {
                const yogunluk = g.sayi === 0 ? 0 : Math.min(4, Math.ceil((g.sayi / maxAkt) * 4));
                const opacity = [0.08, 0.3, 0.55, 0.8, 1][yogunluk];
                return (
                  <div key={i} title={`${g.tarih}: ${g.sayi} soru`}
                    className="aspect-square bg-blue-700 dark:bg-blue-400 rounded-sm"
                    style={{ opacity }} />
                );
              })}
            </div>
            <div className="flex justify-between mt-2 text-[10px] text-stone-500 dark:text-zinc-500 font-semibold">
              <span>30 gün önce</span><span>Bugün</span>
            </div>
          </section>

          {Object.keys(ilerleme.yanlislar).length > 0 && (
            <section className="mb-12">
              <h2 className="font-display text-2xl md:text-3xl tracking-tight mb-6 pb-3 border-b border-stone-900/20 dark:border-zinc-700 font-bold">En Çok Zorlanılanlar</h2>
              <div className="space-y-2">
                {Object.entries(ilerleme.yanlislar)
                  .sort((a, b) => b[1] - a[1])
                  .slice(0, 5)
                  .map(([id, sayi]) => {
                    const s = TUM_SORULAR.find(x => x.id === id);
                    if (!s) return null;
                    const cozulmus = !!ilerleme.cozulenler[id];
                    return (
                      <button key={id}
                        onClick={() => navigate(`/problemler/${id}`)}
                        className="w-full flex items-center justify-between py-3 px-3 border-b border-stone-100 dark:border-zinc-800 hover:bg-stone-50 dark:hover:bg-zinc-800 transition text-sm rounded-lg">
                        <div className="flex items-center gap-3">
                          <Thiings name={s.uniteIcon} size={28} />
                          <span className="font-display font-bold">{s.baslik}</span>
                          {cozulmus && <Icon name="CheckCircle2" size={12} className="text-emerald-700 dark:text-emerald-400" />}
                        </div>
                        <span className="font-mono text-xs text-rose-600 dark:text-rose-400 font-bold">× {sayi}</span>
                      </button>
                    );
                  })}
              </div>
            </section>
          )}

          <section className="pt-8 border-t border-stone-900/10 dark:border-zinc-800">
            <h2 className="font-display text-2xl md:text-3xl tracking-tight mb-6 font-bold">Ayarlar</h2>
            <div className="space-y-2">
              <button onClick={onTemaDegistir}
                className="w-full flex items-center justify-between py-4 px-4 border border-stone-200 dark:border-zinc-700 hover:border-stone-900 dark:hover:border-zinc-400 transition text-left rounded-xl">
                <div className="flex items-center gap-3">
                  <Icon name={ilerleme.tema === "dark" ? "Moon" : "Sun"} size={16} />
                  <span className="font-semibold">Görünüm · {ilerleme.tema === "dark" ? "Karanlık" : "Açık"}</span>
                </div>
                <Icon name="ChevronRight" size={14} className="text-stone-400" />
              </button>
              <button onClick={onDisaAktar}
                className="w-full flex items-center justify-between py-4 px-4 border border-stone-200 dark:border-zinc-700 hover:border-stone-900 dark:hover:border-zinc-400 transition text-left rounded-xl">
                <div className="flex items-center gap-3">
                  <Icon name="Download" size={16} />
                  <span className="font-semibold">İlerlemeyi dışa aktar (JSON)</span>
                </div>
                <Icon name="ChevronRight" size={14} className="text-stone-400" />
              </button>
              <button onClick={onSifirla}
                className="w-full flex items-center justify-between py-4 px-4 border border-stone-200 dark:border-zinc-700 hover:border-rose-600 transition text-left group rounded-xl">
                <div className="flex items-center gap-3 text-rose-700 dark:text-rose-400 group-hover:text-rose-600">
                  <Icon name="Trash2" size={16} />
                  <span className="font-semibold">Tüm ilerlemeyi sıfırla</span>
                </div>
                <Icon name="ChevronRight" size={14} className="text-stone-400" />
              </button>
            </div>
          </section>
        </main>
      );
    }

    function SoruEkrani({ soru, onCozuldu, onYanlis, cozulmusMu, onHesapPlaniYanPanel }) {
      const unite = UNITELER.find(u => u.id === soru.uniteId);
      const [kayitlar, setKayitlar] = useState([
        { kod: "", borc: "", alacak: "" },
        { kod: "", borc: "", alacak: "" },
      ]);
      const [durum, setDurum] = useState("bos");
      const [satirSonuclari, setSatirSonuclari] = useState([]);
      const [ipucuAcik, setIpucuAcik] = useState(false);
      const [cozumAcik, setCozumAcik] = useState(false);

      useEffect(() => {
        setKayitlar([{ kod: "", borc: "", alacak: "" }, { kod: "", borc: "", alacak: "" }]);
        setDurum("bos"); setSatirSonuclari([]);
        setIpucuAcik(false); setCozumAcik(false);
      }, [soru.id]);

      const toplamBorc = kayitlar.reduce((a, k) => a + (+k.borc || 0), 0);
      const toplamAlacak = kayitlar.reduce((a, k) => a + (+k.alacak || 0), 0);
      const esit = Math.abs(toplamBorc - toplamAlacak) < 0.01 && toplamBorc > 0;

      const satirEkle = () => {
        setKayitlar(prev => [...prev, { kod: "", borc: "", alacak: "" }]);
        setSatirSonuclari(prev => [...prev, null]);
        setDurum("bos");
        setTimeout(() => {
          const yeniIdx = kayitlar.length;
          const input = document.querySelector(`[data-row="${yeniIdx}"][data-col="kod"]`);
          if (input) input.focus();
        }, 50);
      };
      const satirSil = (i) => {
        setKayitlar(kayitlar.filter((_, idx) => idx !== i));
        setSatirSonuclari(satirSonuclari.filter((_, idx) => idx !== i));
      };
      const satirGuncelle = (i, alan, deger) => {
        const yeni = [...kayitlar];
        yeni[i] = { ...yeni[i], [alan]: deger };
        if (alan === "borc" && deger) yeni[i].alacak = "";
        if (alan === "alacak" && deger) yeni[i].borc = "";
        setKayitlar(yeni);
        if (durum !== "bos") { setDurum("bos"); setSatirSonuclari([]); }
      };

      const kontrol = useCallback(() => {
        const temiz = kayitlar.filter(k => k.kod && (+k.borc > 0 || +k.alacak > 0));
        if (temiz.length < 2) { alert("En az iki satır dolu olmalı."); return; }
        if (!esit) { alert("Borç ve alacak toplamları eşit değil."); return; }
        const tumKodlar = new Set(HESAP_PLANI.map(h => h.kod));
        for (const k of temiz) {
          if (!tumKodlar.has(k.kod)) { alert(`Geçersiz hesap kodu: ${k.kod}`); return; }
        }
        const { satirSonuclari: sonuc, hepsiDogru } = satirlariKontrolEt(kayitlar, soru.cozum);
        setSatirSonuclari(sonuc);
        if (hepsiDogru) { setDurum("dogru"); onCozuldu(); }
        else { setDurum("yanlis"); onYanlis(); }
      }, [kayitlar, esit, soru.cozum, onCozuldu, onYanlis]);

      useEffect(() => {
        const handler = (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") { e.preventDefault(); kontrol(); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
      }, [kontrol]);

      const bulunanHesap = (kod) => HESAP_PLANI.find(h => h.kod === kod)?.ad || "";
      const handleTutarKey = (e, i, col) => {
        if (e.key === "Enter") {
          e.preventDefault();
          if (i === kayitlar.length - 1 && col === "alacak") satirEkle();
          else {
            const next = document.querySelector(`[data-row="${i + 1}"][data-col="kod"]`);
            if (next) next.focus(); else satirEkle();
          }
        }
      };

      const sonraki = () => {
        const idx = TUM_SORULAR.findIndex(s => s.id === soru.id);
        if (idx < TUM_SORULAR.length - 1) navigate(`/problemler/${TUM_SORULAR[idx + 1].id}`);
        else navigate("/problemler");
      };

      return (
        <main className="max-w-7xl mx-auto px-6 py-8">
          <button onClick={() => navigate("/problemler")}
            className="flex items-center gap-2 text-sm text-stone-500 dark:text-zinc-500 hover:text-stone-900 dark:hover:text-zinc-100 mb-6 group font-semibold">
            <Icon name="ArrowLeft" size={14} />
            <span>Tüm Problemler</span>
          </button>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div className="lg:pr-4">
              <div className="flex items-center gap-3 mb-3">
                <Thiings name={unite?.thiingsIcon} size={24} />
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 font-bold">
                  {unite?.ad}
                </div>
                <span className={`text-[9px] tracking-[0.2em] uppercase font-bold ${ZORLUK_STIL[soru.zorluk]}`}>
                  {ZORLUK_AD[soru.zorluk]} · {ZORLUK_PUAN[soru.zorluk]} puan
                </span>
              </div>
              <h1 className="font-display text-4xl md:text-5xl tracking-tight mb-8 font-bold">{soru.baslik}</h1>
              <div className="border-l-4 border-stone-900 dark:border-zinc-100 pl-6 py-2 mb-8">
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-3 font-bold">Senaryo</div>
                <p className="text-xl leading-relaxed text-stone-800 dark:text-zinc-200 font-medium">{soru.senaryo}</p>
              </div>

              <div className="space-y-3">
                <button onClick={() => setIpucuAcik(!ipucuAcik)}
                  className="w-full flex items-center justify-between p-4 border border-stone-300 dark:border-zinc-700 hover:border-stone-900 dark:hover:border-zinc-400 transition text-left rounded-xl">
                  <div className="flex items-center gap-3">
                    <Icon name="Lightbulb" size={16} className="text-amber-600" />
                    <span className="text-sm font-semibold">İpucu</span>
                  </div>
                  <Icon name="ChevronRight" size={14} className={`text-stone-400 transition-transform ${ipucuAcik ? "rotate-90" : ""}`} />
                </button>
                {ipucuAcik && (
                  <div className="p-5 bg-amber-50 dark:bg-amber-900/10 border border-amber-200 dark:border-amber-800/40 text-stone-700 dark:text-zinc-300 leading-relaxed font-medium rounded-xl">
                    {soru.ipucu}
                  </div>
                )}
                <button onClick={onHesapPlaniYanPanel}
                  className="w-full flex items-center justify-between p-4 border border-stone-300 dark:border-zinc-700 hover:border-stone-900 dark:hover:border-zinc-400 transition text-left rounded-xl">
                  <div className="flex items-center gap-3">
                    <Icon name="PanelRight" size={16} />
                    <span className="text-sm font-semibold">Hesap Planını Yan Panelde Aç</span>
                  </div>
                  <Icon name="ChevronRight" size={14} className="text-stone-400" />
                </button>
              </div>

              <div className="mt-8 pt-6 border-t border-stone-900/10 dark:border-zinc-800">
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-400 dark:text-zinc-600 mb-3 font-bold">Klavye Kısayolları</div>
                <div className="space-y-1.5 text-xs text-stone-500 dark:text-zinc-500 font-medium">
                  <div className="flex items-center gap-3">
                    <kbd className="font-mono bg-stone-100 dark:bg-zinc-800 px-2 py-0.5 border border-stone-300 dark:border-zinc-700 font-bold rounded">Enter</kbd>
                    <span>Sonraki hücre / yeni satır</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <kbd className="font-mono bg-stone-100 dark:bg-zinc-800 px-2 py-0.5 border border-stone-300 dark:border-zinc-700 font-bold rounded">↓ ↑</kbd>
                    <span>Öneriler arasında gezin</span>
                  </div>
                  <div className="flex items-center gap-3">
                    <kbd className="font-mono bg-stone-100 dark:bg-zinc-800 px-2 py-0.5 border border-stone-300 dark:border-zinc-700 font-bold rounded">Ctrl</kbd>
                    <span>+</span>
                    <kbd className="font-mono bg-stone-100 dark:bg-zinc-800 px-2 py-0.5 border border-stone-300 dark:border-zinc-700 font-bold rounded">Enter</kbd>
                    <span>Kontrol et</span>
                  </div>
                </div>
              </div>
            </div>

            <div className="lg:pl-4 lg:border-l border-stone-900/10 dark:border-zinc-800">
              <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-3 font-bold">Yevmiye Kaydı</div>
              <div className="bg-white dark:bg-zinc-900 border border-stone-900/20 dark:border-zinc-700 rounded-xl overflow-hidden">
                <div className="grid grid-cols-12 gap-2 px-4 py-3 border-b border-stone-900/20 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-800 text-[10px] tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">
                  <div className="col-span-3">Kod / Hesap</div>
                  <div className="col-span-4">Hesap Adı</div>
                  <div className="col-span-2 text-right">Borç</div>
                  <div className="col-span-2 text-right">Alacak</div>
                  <div className="col-span-1"></div>
                </div>
                {kayitlar.map((k, i) => {
                  const sonuc = satirSonuclari[i];
                  let satirStil = "";
                  if (durum === "yanlis" && sonuc === false) satirStil = "bg-red-50/50 dark:bg-red-900/10 row-error";
                  else if (durum === "yanlis" && sonuc === true) satirStil = "bg-emerald-50/40 dark:bg-emerald-900/10";
                  return (
                    <div key={i} className={`grid grid-cols-12 gap-2 px-4 py-3 border-b border-stone-900/5 dark:border-zinc-800 items-center transition-colors ${satirStil}`}>
                      <div className="col-span-3">
                        <HesapKoduInput value={k.kod} onChange={(v) => satirGuncelle(i, "kod", v)} rowIndex={i} />
                      </div>
                      <div className="col-span-4 text-xs text-stone-600 dark:text-zinc-400 truncate px-1 font-medium">{bulunanHesap(k.kod)}</div>
                      <input type="number" value={k.borc}
                        onChange={(e) => satirGuncelle(i, "borc", e.target.value)}
                        onKeyDown={(e) => handleTutarKey(e, i, "borc")}
                        placeholder="0,00" data-row={i} data-col="borc"
                        className="col-span-2 font-mono text-sm text-right px-2 py-1.5 bg-stone-50 dark:bg-zinc-800 border border-transparent focus:border-stone-900 dark:focus:border-zinc-400 focus:bg-white dark:focus:bg-zinc-900 outline-none transition font-semibold" />
                      <input type="number" value={k.alacak}
                        onChange={(e) => satirGuncelle(i, "alacak", e.target.value)}
                        onKeyDown={(e) => handleTutarKey(e, i, "alacak")}
                        placeholder="0,00" data-row={i} data-col="alacak"
                        className="col-span-2 font-mono text-sm text-right px-2 py-1.5 bg-stone-50 dark:bg-zinc-800 border border-transparent focus:border-stone-900 dark:focus:border-zinc-400 focus:bg-white dark:focus:bg-zinc-900 outline-none transition font-semibold" />
                      <div className="col-span-1 flex items-center justify-center">
                        {durum === "yanlis" && sonuc === false && (
                          <span title="Hatalı"><Icon name="X" size={14} className="text-red-600" /></span>
                        )}
                        {durum === "yanlis" && sonuc === true && (
                          <span title="Doğru"><Icon name="Check" size={14} className="text-emerald-600" /></span>
                        )}
                        {durum !== "yanlis" && kayitlar.length > 2 && (
                          <button onClick={() => satirSil(i)} className="text-stone-300 dark:text-zinc-600 hover:text-red-600 transition">
                            <Icon name="Trash2" size={14} />
                          </button>
                        )}
                      </div>
                    </div>
                  );
                })}
                <button onClick={satirEkle}
                  className="w-full px-4 py-3 text-xs text-stone-500 dark:text-zinc-500 hover:text-stone-900 dark:hover:text-zinc-100 hover:bg-stone-50 dark:hover:bg-zinc-800 transition flex items-center justify-center gap-2 border-b border-stone-900/20 dark:border-zinc-700 font-semibold">
                  <Icon name="Plus" size={12} /> Satır Ekle
                </button>
                <div className="grid grid-cols-12 gap-2 px-4 py-3 bg-stone-50 dark:bg-zinc-800 text-sm font-mono items-center">
                  <div className="col-span-7 text-[10px] tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">Toplam</div>
                  <div className={`col-span-2 text-right font-bold ${esit ? "text-emerald-700 dark:text-emerald-400" : ""}`}>
                    {paraFormat(toplamBorc) || "0,00"}
                  </div>
                  <div className={`col-span-2 text-right font-bold ${esit ? "text-emerald-700 dark:text-emerald-400" : ""}`}>
                    {paraFormat(toplamAlacak) || "0,00"}
                  </div>
                  <div className="col-span-1 flex justify-center">
                    {esit && <Icon name="CheckCircle2" size={14} className="text-emerald-700 dark:text-emerald-400" />}
                  </div>
                </div>
              </div>

              <div className="mt-6 flex gap-3">
                <button onClick={kontrol}
                  className="flex-1 bg-stone-900 dark:bg-zinc-100 text-stone-50 dark:text-zinc-900 py-3.5 text-sm tracking-wide uppercase font-bold hover:bg-stone-800 dark:hover:bg-white transition flex items-center justify-center gap-2 rounded-xl shadow-lg">
                  <Icon name="Zap" size={14} />
                  Kaydı Kontrol Et
                  <span className="font-mono text-[9px] opacity-60 ml-2">Ctrl+↵</span>
                </button>
                <button onClick={() => setCozumAcik(true)}
                  className="px-5 py-3.5 border-2 border-stone-300 dark:border-zinc-700 text-sm tracking-wide uppercase font-bold hover:border-stone-900 dark:hover:border-zinc-400 transition rounded-xl">
                  Çözüm
                </button>
              </div>

              {durum === "dogru" && (
                <div className="mt-4 p-5 border-l-4 border-emerald-700 dark:border-emerald-400 bg-emerald-50 dark:bg-emerald-900/10 rounded-xl">
                  <div className="flex items-center gap-3 mb-2">
                    <Icon name="CheckCircle2" size={20} className="text-emerald-700 dark:text-emerald-400" />
                    <div className="font-display text-lg font-bold">
                      Doğru kayıt. {cozulmusMu ? "" : `+${ZORLUK_PUAN[soru.zorluk]} puan`}
                    </div>
                  </div>
                  <p className="text-sm text-stone-700 dark:text-zinc-300 leading-relaxed mb-4 font-medium">{soru.aciklama}</p>
                  <button onClick={sonraki}
                    className="flex items-center gap-2 text-sm bg-stone-900 dark:bg-zinc-100 text-stone-50 dark:text-zinc-900 px-4 py-2 hover:bg-stone-800 dark:hover:bg-white transition rounded-lg font-semibold">
                    Sıradaki Soru <Icon name="ArrowRight" size={14} />
                  </button>
                </div>
              )}
              {durum === "yanlis" && (
                <div className="mt-4 p-5 border-l-4 border-red-700 dark:border-red-400 bg-red-50 dark:bg-red-900/10 rounded-xl">
                  <div className="flex items-center gap-3 mb-2">
                    <Icon name="X" size={20} className="text-red-700 dark:text-red-400" />
                    <div className="font-display text-lg font-bold">Kayıt doğru değil.</div>
                  </div>
                  <p className="text-sm text-stone-600 dark:text-zinc-400 font-medium">
                    {satirSonuclari.filter(s => s === false).length} satırda hata var.
                    {kayitlar.length !== soru.cozum.length && (
                      <span className="block mt-1 text-stone-500 dark:text-zinc-500 text-xs">
                        Beklenen satır sayısı {soru.cozum.length}, sizin girdiğiniz {kayitlar.length}.
                      </span>
                    )}
                  </p>
                </div>
              )}
            </div>
          </div>

          {cozumAcik && <CozumModal soru={soru} onKapat={() => setCozumAcik(false)} />}
        </main>
      );
    }

    function CozumModal({ soru, onKapat }) {
      const toplamBorc = soru.cozum.reduce((a, k) => a + (+k.borc || 0), 0);
      const toplamAlacak = soru.cozum.reduce((a, k) => a + (+k.alacak || 0), 0);
      return (
        <div className="fixed inset-0 z-50 bg-stone-900/60 flex items-center justify-center p-4" onClick={onKapat}>
          <div className="bg-stone-50 dark:bg-zinc-900 max-w-3xl w-full max-h-[90vh] overflow-auto rounded-2xl" onClick={e => e.stopPropagation()}>
            <div className="sticky top-0 bg-stone-50 dark:bg-zinc-900 border-b border-stone-900/10 dark:border-zinc-800 px-8 py-5 flex items-center justify-between">
              <div>
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-1 font-bold">Resmi Çözüm</div>
                <div className="font-display text-2xl tracking-tight font-bold">{soru.baslik}</div>
              </div>
              <button onClick={onKapat} className="text-stone-500 hover:text-stone-900 dark:hover:text-zinc-100">
                <Icon name="X" size={20} />
              </button>
            </div>
            <div className="p-8">
              <div className="bg-white dark:bg-zinc-800 border border-stone-900/20 dark:border-zinc-700 mb-6 rounded-xl overflow-hidden">
                <div className="grid grid-cols-12 gap-2 px-4 py-3 border-b border-stone-900/20 dark:border-zinc-700 bg-stone-50 dark:bg-zinc-900 text-[10px] tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">
                  <div className="col-span-2">Kod</div>
                  <div className="col-span-5">Hesap</div>
                  <div className="col-span-2 text-right">Borç</div>
                  <div className="col-span-3 text-right">Alacak</div>
                </div>
                {soru.cozum.map((k, i) => {
                  const ad = HESAP_PLANI.find(h => h.kod === k.kod)?.ad || "";
                  return (
                    <div key={i} className="grid grid-cols-12 gap-2 px-4 py-3 border-b border-stone-900/5 dark:border-zinc-700 text-sm">
                      <div className="col-span-2 font-mono font-bold">{k.kod}</div>
                      <div className="col-span-5 font-medium">{ad}</div>
                      <div className="col-span-2 text-right font-mono font-semibold">{k.borc > 0 ? paraFormat(k.borc) : ""}</div>
                      <div className="col-span-3 text-right font-mono font-semibold">{k.alacak > 0 ? paraFormat(k.alacak) : ""}</div>
                    </div>
                  );
                })}
                <div className="grid grid-cols-12 gap-2 px-4 py-3 bg-stone-50 dark:bg-zinc-900 font-mono text-sm">
                  <div className="col-span-7 text-[10px] tracking-[0.2em] uppercase text-stone-500 dark:text-zinc-500 font-bold">Toplam</div>
                  <div className="col-span-2 text-right font-bold">{paraFormat(toplamBorc)}</div>
                  <div className="col-span-3 text-right font-bold">{paraFormat(toplamAlacak)}</div>
                </div>
              </div>
              <div className="border-l-4 border-stone-900 dark:border-zinc-100 pl-5 py-1">
                <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-2 font-bold">Açıklama</div>
                <p className="leading-relaxed font-medium">{soru.aciklama}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function HesapPlaniListesi({ onKapat, modal }) {
      const [arama, setArama] = useState("");
      const [seciliSinif, setSeciliSinif] = useState("hepsi");
      const filtrelenmis = useMemo(() => {
        let sonuc = HESAP_PLANI;
        if (seciliSinif !== "hepsi") sonuc = sonuc.filter(h => h.sinif === seciliSinif);
        if (arama.trim()) {
          const a = arama.toLocaleLowerCase("tr");
          sonuc = sonuc.filter(h => h.kod.includes(a) || h.ad.toLocaleLowerCase("tr").includes(a));
        }
        return sonuc;
      }, [arama, seciliSinif]);
      const gruplanmis = useMemo(() => {
        const g = {};
        filtrelenmis.forEach(h => { if (!g[h.sinif]) g[h.sinif] = []; g[h.sinif].push(h); });
        return g;
      }, [filtrelenmis]);

      return (
        <>
          <div className="border-b border-stone-900/10 dark:border-zinc-800 px-6 py-4 flex items-center justify-between flex-shrink-0">
            <div>
              <div className="text-[10px] tracking-[0.3em] uppercase text-stone-500 dark:text-zinc-500 mb-1 font-bold">Referans</div>
              <div className="font-display text-2xl tracking-tight font-bold">Tek Düzen Hesap Planı</div>
            </div>
            <button onClick={onKapat} className="text-stone-500 hover:text-stone-900 dark:hover:text-zinc-100">
              <Icon name="X" size={20} />
            </button>
          </div>
          <div className="px-6 py-4 border-b border-stone-900/10 dark:border-zinc-800 flex gap-3 flex-wrap items-center flex-shrink-0">
            <div className="relative flex-1 min-w-[160px]">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-stone-400">
                <Icon name="Search" size={14} />
              </span>
              <input type="text" value={arama} onChange={(e) => setArama(e.target.value)}
                placeholder="Kod veya ad ara..."
                className="w-full pl-9 pr-3 py-2 bg-white dark:bg-zinc-800 border border-stone-300 dark:border-zinc-700 focus:border-stone-900 dark:focus:border-zinc-400 outline-none text-sm rounded-lg font-medium" />
            </div>
            <div className="flex gap-1 flex-wrap">
              {["hepsi", "1", "2", "3", "5", "6", "7"].map(s => (
                <button key={s} onClick={() => setSeciliSinif(s)}
                  className={`px-2.5 py-1.5 text-xs tracking-wider transition rounded-lg font-bold ${
                    seciliSinif === s ? "bg-stone-900 dark:bg-zinc-100 text-stone-50 dark:text-zinc-900" : "bg-white dark:bg-zinc-800 border border-stone-300 dark:border-zinc-700 hover:border-stone-900 dark:hover:border-zinc-400"
                  }`}>
                  {s === "hepsi" ? "HEPSİ" : s}
                </button>
              ))}
            </div>
          </div>
          <div className="flex-1 overflow-auto px-6 py-4">
            {Object.keys(gruplanmis).sort().map(sinif => (
              <div key={sinif} className="mb-6">
                <div className="flex items-baseline gap-3 mb-2 pb-2 border-b border-stone-900/20 dark:border-zinc-700">
                  <div className="font-display text-xl font-bold">{sinif}</div>
                  <div className="text-xs tracking-wide text-stone-600 dark:text-zinc-400 uppercase font-bold">{SINIF_ISIMLERI[sinif]}</div>
                </div>
                <div className={modal ? "grid grid-cols-1 md:grid-cols-2 gap-x-6" : ""}>
                  {gruplanmis[sinif].map(h => (
                    <div key={h.kod} className="flex items-center gap-3 py-1.5 border-b border-stone-900/5 dark:border-zinc-800 text-sm">
                      <div className="font-mono font-bold w-10">{h.kod}</div>
                      <div className="flex-1 text-xs font-medium">{h.ad}</div>
                      <div className={`text-[9px] tracking-widest uppercase font-bold ${
                        h.tur === "AKTİF" ? "text-blue-700 dark:text-blue-400" :
                        h.tur === "PASİF" ? "text-amber-700 dark:text-amber-400" :
                        h.tur === "GELİR" ? "text-emerald-700 dark:text-emerald-400" :
                        h.tur === "GİDER" ? "text-red-700 dark:text-red-400" : "text-stone-500"
                      }`}>{h.tur}</div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {filtrelenmis.length === 0 && (
              <div className="text-center text-stone-400 dark:text-zinc-600 py-12 font-medium">Sonuç bulunamadı.</div>
            )}
          </div>
        </>
      );
    }

    function HesapPlaniModal({ onKapat }) {
      return (
        <div className="fixed inset-0 z-50 bg-stone-900/60 flex items-center justify-center p-4" onClick={onKapat}>
          <div className="bg-stone-50 dark:bg-zinc-900 max-w-5xl w-full max-h-[90vh] flex flex-col rounded-2xl" onClick={e => e.stopPropagation()}>
            <HesapPlaniListesi onKapat={onKapat} modal={true} />
          </div>
        </div>
      );
    }

    function HesapPlaniYanPanel({ acik, onKapat }) {
      return (
        <>
          {acik && <div className="fixed inset-0 z-40 bg-stone-900/20 transition-opacity" onClick={onKapat} />}
          <div className={`fixed top-0 right-0 h-full w-full md:w-[480px] bg-stone-50 dark:bg-zinc-900 z-50 slide-panel ${acik ? "open" : ""} shadow-2xl flex flex-col`}>
            <HesapPlaniListesi onKapat={onKapat} modal={false} />
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
